short: Mathematical and computational techniques to understand the theoretical foundation of neural heterogeneity.
long: |-
  <p>
    With an interdisciplinary background, Yishu Zhang is passionate about finding the concise and beautiful theoretical foundation that captures the essence of complex systems. Her interest in neuroscience was inspired by a curiosity about understanding how the brain is able to conduct cognitive processes, such as multiple forms of learning. She believes that neural heterogeneity is related to fundamental aspects of cognition, and is interested in applying both mathematical and computational techniques to understand the theoretical foundation of neural heterogeneity. She hopes that her research will not only contribute to understanding fundamental aspects of cognition, but also inspire more people from diverse backgrounds to contribute to neuroscience research, and find happiness from the process of discovery.
  </p>
